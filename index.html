<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project Viewer</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Style for the tab container */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        /* Style for the buttons */
        .tab-button {
            padding: 10px 20px;
            background-color: #f1f1f1;
            border: 1px solid #ccc;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-size: 16px;
        }

        .tab-button:hover {
            background-color: #ddd;
        }

        /* The active tab style */
        .tab-button.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }

        /* Style for the iframe window */
        #content-frame {
            width: 100%;
            height: 75vh; /* Takes up 75% of the screen height */
            border: 2px dashed #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab(event, 'dashboard.html')">Dashboard</button>
        <button class="tab-button" onclick="switchTab(event, 'prototype.html')">Prototype</button>
    </div>

    <iframe id="content-frame" src="dashboard.html" title="Content Viewer"></iframe>

    <script>
        function switchTab(event, fileName) {
            // 1. Change the iframe source to the new file
            document.getElementById('content-frame').src = fileName;

            // 2. Remove the 'active' class from all buttons
            let buttons = document.getElementsByClassName('tab-button');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }

            // 3. Add the 'active' class to the button that was just clicked
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>
