<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SaathiAI Prototype Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wa-dark: #075E54;
      --wa-light: #25D366;
      --wa-chat: #E5DDD5;
      --wa-out: #DCF8C6;
      --ink: #212529;
      --muted: #6C757D;
      --navy: #1A237E;
      --line: #e5e7eb;
      --shadow: 0 12px 30px rgba(17, 24, 39, .13);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #E0E0E0;
      color: var(--ink);
      font: 14px/1.45 "Noto Sans", "Noto Sans Devanagari", system-ui, sans-serif;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease, background .15s ease;
    }
    button:active { transform: translateY(1px) scale(.99); }

    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,.05), 0 25px 70px rgba(0,0,0,.16);
      position: relative;
      overflow: hidden;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .top-nav button {
      min-height: 52px;
      padding: 6px 4px 8px;
      background: #fff;
      color: #374151;
      border-radius: 0;
      font-size: 12px;
      line-height: 1.18;
      border-bottom: 3px solid transparent;
    }
    .top-nav button.active {
      color: var(--wa-dark);
      border-bottom-color: var(--wa-light);
    }

    .demo-banner {
      position: sticky;
      top: 52px;
      z-index: 25;
      padding: 5px 8px;
      text-align: center;
      background: #F0F0F0;
      color: #666;
      font-size: 11px;
      border-bottom: 1px solid #ddd;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 76px;
      z-index: 100;
      max-width: min(360px, calc(100vw - 28px));
      transform: translateX(-50%) translateY(-12px);
      opacity: 0;
      pointer-events: none;
      background: #323232;
      color: #fff;
      border-radius: 20px;
      padding: 9px 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.24);
      transition: opacity .2s ease, transform .2s ease;
      font-size: 13px;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.green { background: #198754; }

    .view { min-height: calc(100vh - 79px); }

    .chat-view {
      height: calc(100vh - 79px);
      display: flex;
      flex-direction: column;
      background: var(--wa-chat);
    }
    .chat-header {
      flex: 0 0 auto;
      background: var(--wa-dark);
      color: #fff;
      padding: 10px 12px;
    }
    .chat-title-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .back { font-size: 22px; font-weight: 600; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      background: #9ca3af;
      font-weight: 800;
      font-size: 13px;
    }
    .avatar.tc { background: #2563eb; }
    .avatar.g { background: #f97316; }
    .chat-name { flex: 1; font-size: 16px; font-weight: 700; }
    .online { font-size: 12px; white-space: nowrap; }
    .step-label { margin-top: 2px; color: rgba(255,255,255,.78); font-size: 11px; }
    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      padding: 8px 0;
      background: rgba(255,255,255,.28);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a7b0ad;
    }
    .dot.active { background: var(--wa-light); }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 18px;
      background:
        radial-gradient(circle at 8px 8px, rgba(255,255,255,.23) 1px, transparent 1px),
        var(--wa-chat);
      background-size: 22px 22px;
    }
    .message-row {
      display: flex;
      gap: 7px;
      align-items: flex-end;
      margin: 8px 0;
      animation: popIn .2s ease both;
    }
    .message-row.out { justify-content: flex-end; }
    .message-row.out .bubble {
      background: var(--wa-out);
      border-top-right-radius: 3px;
    }
    .bubble {
      max-width: 82%;
      background: #fff;
      border-radius: 8px;
      border-top-left-radius: 3px;
      padding: 8px 9px 6px;
      box-shadow: 0 1px .5px rgba(0,0,0,.13);
      color: #111827;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }
    .sender {
      color: var(--wa-dark);
      font-weight: 700;
      font-size: 11px;
      margin-bottom: 3px;
    }
    .time {
      display: block;
      margin-top: 5px;
      color: #667085;
      text-align: right;
      font-size: 10px;
    }
    .voice {
      min-width: 230px;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #374151;
      font-weight: 600;
    }
    .play {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #e5e7eb;
      color: var(--wa-dark);
      font-size: 12px;
    }
    .wave { flex: 1; height: 4px; border-radius: 99px; background: repeating-linear-gradient(90deg, #8aa092 0 7px, transparent 7px 11px); }
    .date-sep {
      margin: 18px auto 12px;
      width: fit-content;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      color: #4b5563;
      box-shadow: 0 1px .5px rgba(0,0,0,.1);
      font-size: 12px;
      font-weight: 700;
    }
    @keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .action-bar {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #F0F0F0;
      border-top: 1px solid #ddd;
    }
    .primary-action {
      width: 100%;
      background: var(--wa-light);
      color: #063d2f;
      box-shadow: inset 0 -1px rgba(0,0,0,.12);
    }
    .chip {
      flex: 1 1 auto;
      padding: 0 12px;
      background: #fff;
      color: var(--wa-dark);
      border: 1px solid #d1d5db;
      font-size: 13px;
    }
    .chip.strong { background: var(--wa-light); color: #063d2f; border-color: var(--wa-light); }
    .processing {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--wa-dark);
      font-weight: 700;
    }
    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--wa-light);
      animation: pulse .75s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { transform: scale(.72); opacity: .55; } to { transform: scale(1.2); opacity: 1; } }

    .skill-card {
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid #e8edf5;
    }
    .skill-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--navy);
      color: #fff;
      padding: 10px 12px;
      font-weight: 800;
      letter-spacing: .02em;
      font-size: 13px;
    }
    .verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      background: var(--wa-light);
      color: #fff;
      padding: 4px 8px;
      font-size: 10px;
      white-space: nowrap;
    }
    .skill-body { padding: 12px; }
    .person-name { font-size: 18px; font-weight: 800; }
    .divider { height: 1px; background: #edf0f5; margin: 10px 0; }
    .check { color: var(--wa-light); font-weight: 900; margin-right: 6px; }
    .skill-foot { background: #f3f4f6; color: #4b5563; padding: 9px 12px; font-size: 11px; }

    .job-card {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .job-card .job-main { padding: 10px; }
    .job-title { font-size: 15px; font-weight: 800; }
    .job-company { color: #4b5563; margin-top: 2px; }
    .job-meta { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eef0f3; color: #374151; font-size: 12px; }
    .mini-apply {
      margin-top: 10px;
      width: 100%;
      min-height: 38px;
      border-radius: 6px;
      background: #eefdf4;
      color: var(--wa-dark);
    }

    .success-overlay {
      position: absolute;
      inset: 79px 0 0;
      z-index: 40;
      display: grid;
      place-items: center;
      background: var(--wa-light);
      color: #fff;
      padding: 24px;
      text-align: center;
      animation: fadeIn .22s ease both;
    }
    .success-card { width: 100%; max-width: 330px; }
    .success-emoji { font-size: 64px; line-height: 1; }
    .success-title { margin: 12px 0 4px; font-size: 24px; font-weight: 900; }
    .success-sub { margin-bottom: 20px; font-weight: 700; }
    .white-btn {
      width: 100%;
      margin-top: 9px;
      background: #fff;
      color: var(--wa-dark);
      border: 2px solid #fff;
    }
    .outline-btn { background: transparent; color: #fff; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .dash-view, .employer-view {
      min-height: calc(100vh - 79px);
      overflow-y: auto;
      background: #F8F9FA;
      padding: 14px;
    }
    .dash-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 8px;
      background: var(--wa-dark);
      color: #fff;
      box-shadow: 0 8px 22px rgba(7, 94, 84, .22);
    }
    .dash-title { font-size: 18px; font-weight: 800; }
    .dash-sub { color: rgba(255,255,255,.82); font-size: 12px; margin-top: 2px; }
    .alert-btn {
      padding: 0 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.14);
      color: #fff;
      font-size: 12px;
    }
    .facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    .fact {
      background: #fff;
      border: 1px solid #edf0f2;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .fact strong { display: block; color: var(--ink); font-size: 15px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 12px 0 16px;
    }
    .stat {
      min-height: 92px;
      background: #fff;
      border: 1px solid #edf0f2;
      border-radius: 8px;
      padding: 13px;
      box-shadow: 0 4px 14px rgba(17,24,39,.05);
    }
    .stat .num { font-size: 24px; font-weight: 900; }
    .stat .label { color: var(--muted); font-weight: 700; font-size: 12px; }
    .section-title {
      margin: 16px 0 8px;
      font-size: 16px;
      font-weight: 800;
    }
    .learner-row {
      width: 100%;
      min-height: 70px;
      display: flex;
      gap: 10px;
      align-items: center;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 1px solid #edf0f2;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      box-shadow: 0 3px 12px rgba(17,24,39,.04);
    }
    .row-main { flex: 1; min-width: 0; }
    .row-name { font-weight: 800; }
    .row-meta { color: var(--muted); font-size: 12px; }
    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }
    .placed { background: #dcfce7; color: #166534; }
    .progress { background: #fef3c7; color: #92400e; }
    .nudge { background: #ffedd5; color: #9a3412; }
    .risk { background: #fee2e2; color: #991b1b; }
    .detail {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #edf0f2;
      padding: 14px;
      box-shadow: var(--shadow);
      animation: popIn .2s ease both;
    }
    .back-btn {
      margin-bottom: 12px;
      background: #eef2f7;
      color: var(--wa-dark);
      padding: 0 12px;
    }
    .detail-block {
      padding: 12px 0;
      border-top: 1px solid #edf0f2;
    }
    .detail-block h3 {
      margin: 0 0 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
    }
    .small-action {
      margin-top: 8px;
      padding: 0 12px;
      background: #e8f8ee;
      color: var(--wa-dark);
    }
    .alerts-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      padding: 0 12px;
    }
    .alert-card {
      margin-top: 8px;
      background: #fff;
      border: 1px solid #edf0f2;
      border-left: 4px solid #FFC107;
      border-radius: 8px;
      padding: 12px;
    }
    .analytics {
      margin: 16px 0 2px;
      background: #fff;
      border: 1px solid #edf0f2;
      border-radius: 8px;
      padding: 14px;
    }
    .bar {
      height: 12px;
      border-radius: 999px;
      background: #e9ecef;
      overflow: hidden;
      margin: 8px 0 7px;
    }
    .bar span { display: block; width: 43%; height: 100%; background: var(--wa-light); }

    .employer-view {
      background: #eef3f8;
      padding: 0 14px 18px;
    }
    .secure {
      margin: 0 -14px 14px;
      padding: 10px 14px;
      background: #f3f4f6;
      color: #4b5563;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
    }
    .secure strong { display: block; color: var(--wa-dark); font-size: 14px; }
    .employer-card {
      overflow: hidden;
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid #dde6f0;
    }
    .employer-card .skill-head { padding: 13px 14px; }
    .profile-line {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 16px 14px;
      border-bottom: 1px solid #edf0f5;
    }
    .profile-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #eef2ff;
      display: grid;
      place-items: center;
      font-size: 22px;
    }
    .card-section {
      padding: 14px;
      border-bottom: 1px solid #edf0f5;
    }
    .card-section h3 {
      margin: 0 0 9px;
      color: #64748b;
      font-size: 11px;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    .record {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 4px 8px;
      color: #334155;
      font-size: 13px;
    }
    .record span:nth-child(odd) { color: #64748b; }
    .verify-btn {
      width: 100%;
      margin-top: 12px;
      background: #eefdf4;
      color: var(--wa-dark);
    }
    .cta {
      margin-top: 14px;
      padding: 16px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dde6f0;
      text-align: center;
    }
    .cta h2 { margin: 0 0 6px; font-size: 18px; }
    .cta p { margin: 0 0 14px; color: var(--muted); }
    .cta .primary-action { margin-bottom: 8px; }
    .or { color: var(--muted); margin: 8px 0; font-size: 12px; }
    .secondary-btn {
      width: 100%;
      background: #f3f4f6;
      color: #374151;
    }
    .footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
      font-size: 11px;
    }

    @media (min-width: 620px) {
      body { padding: 24px 0; }
      .app-shell {
        min-height: calc(100vh - 48px);
        border-radius: 28px;
        border: 10px solid #111827;
      }
      .chat-view, .view, .dash-view, .employer-view { min-height: calc(100vh - 127px); }
      .chat-view { height: calc(100vh - 127px); }
      .success-overlay { inset: 79px 0 0; }
      .toast { top: 92px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <nav class="top-nav" aria-label="Prototype views">
      <button type="button" data-tab="learner" class="active">👤 Learner View</button>
      <button type="button" data-tab="officer">📊 Officer Dashboard</button>
      <button type="button" data-tab="employer">🏭 Employer View</button>
    </nav>
    <div class="demo-banner">🎓 SaathiAI — Prototype Demo | Hackathon Submission</div>
    <section id="root"></section>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const state = {
      tab: "learner",
      step: 1,
      processing: false,
      practiceStage: "start",
      practiced: false,
      selectedLearner: null,
      alertsOpen: false,
      toastTimer: null
    };

    const learners = [
      ["Ramu Kumar", "Electrician L3", "Active now", "🟢 PLACED", "placed", "#075E54"],
      ["Priya Devi", "COPA L3", "2 hours ago", "🟡 IN PROGRESS", "progress", "#2563eb"],
      ["Suresh Yadav", "Fitter L3", "Yesterday", "🟡 IN PROGRESS", "progress", "#7c3aed"],
      ["Anita Singh", "Electrician L3", "3 days ago", "🟠 NEEDS NUDGE", "nudge", "#ea580c"],
      ["Mohan Lal", "Mechanic L4", "8 days ago", "🔴 AT RISK", "risk", "#dc2626"],
      ["Kavya Tiwari", "COPA L3", "Just now", "🟢 PLACED", "placed", "#16a34a"]
    ];

    const jobs = [
      ["⚡ Electrical Contractor", "Gupta Electricals Pvt. Ltd.", "📍 12 km — Varanasi City", "💰 ₹14,000 – ₹18,000 / month", "🕐 Posted 2 days ago • 2 openings"],
      ["🏭 Apprentice Electrician", "Varanasi Industrial Zone (NAPS)", "📍 18 km — Ramnagar", "💰 ₹8,000 stipend / month", "🏛️ Government Registered • NAPS"],
      ["⚡ Junior Electrician", "BHU Infrastructure Projects", "📍 8 km — BHU Campus", "💰 ₹12,000 – ₹15,000 / month", "🕐 Posted today • 1 opening"]
    ];

    const root = document.getElementById("root");
    const toast = document.getElementById("toast");

    function setState(next) {
      Object.assign(state, next);
      render();
    }

    function showToast(message, green = false) {
      clearTimeout(state.toastTimer);
      toast.textContent = message;
      toast.className = "toast show" + (green ? " green" : "");
      state.toastTimer = setTimeout(() => toast.className = "toast", 2500);
    }

    function setTab(tab) {
      state.tab = tab;
      state.selectedLearner = null;
      document.querySelectorAll(".top-nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      render();
    }

    function advance(step, extra = {}) {
      setState({ step, processing: false, ...extra });
      requestAnimationFrame(scrollChat);
    }

    function resetDemo() {
      setState({ step: 1, processing: false, practiceStage: "start", practiced: false });
      showToast("Demo restarted");
    }

    function processSkillCard() {
      setState({ processing: true });
      setTimeout(() => advance(4), 1500);
    }

    function nextQuestion() {
      setState({ practiceStage: "question2" });
      requestAnimationFrame(scrollChat);
    }

    function finishPractice() {
      advance(7, { practiced: true, practiceStage: "done" });
    }

    function scrollChat() {
      const end = document.getElementById("chat-end");
      if (end) end.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function message({ side = "in", sender = "SaathiAI", avatar = "S", avatarClass = "", text = "", html = "", time = "", voice = "", date = "" }) {
      if (date) return `<div class="date-sep">${date}</div>`;
      const outgoing = side === "out";
      return `
        <div class="message-row ${outgoing ? "out" : ""}">
          ${outgoing ? "" : `<span class="avatar ${avatarClass}">${avatar}</span>`}
          <div class="bubble">
            ${!outgoing && sender ? `<div class="sender">${sender}</div>` : ""}
            ${voice ? voiceBubble(voice) : (html || escapeHtml(text))}
            ${time ? `<span class="time">${time}${outgoing ? " ✓✓" : ""}</span>` : ""}
          </div>
        </div>
      `;
    }

    function voiceBubble(duration) {
      return `<div class="voice"><span>🎤</span><span class="play">▶</span><span class="wave"></span><span>${duration}</span></div>`;
    }

    function skillCard(compact = false) {
      return `
        <div class="skill-card">

    function actionBar() {
      if (state.processing) return `<div class="action-bar"><div class="processing"><span class="pulse"></span>Processing...</div></div>`;
      if (state.step === 1) return `<div class="action-bar"><button class="primary-action" data-step="2">START करें →</button></div>`;
      if (state.step === 2) return `
        <div class="action-bar">
          <button class="chip strong" data-step="3">🎤 Voice Note भेजें</button>
          <button class="chip" data-step="3">✍️ Type करें</button>
          <button class="chip" data-step="3">हिंदी में बात करें</button>
        </div>`;
      if (state.step === 3) return `<div class="action-bar"><button class="primary-action" data-process>Skill Card देखें →</button></div>`;
      if (state.step === 4) return `<div class="action-bar"><button class="primary-action" data-step="5">हाँ, Jobs दिखाओ! →</button></div>`;
      if (state.step === 5) return `
        <div class="action-bar">
          <button class="chip strong" data-practice>हाँ, Practice करें!</button>
          <button class="chip" data-step="7">बाद में</button>

      if (state.step === 6 && state.practiceStage === "start") return `
        <div class="action-bar">
          <button class="chip strong" data-feedback>🎤 जवाब दें</button>
          <button class="chip" data-step="7">Skip करें</button>
        </div>`;
      if (state.step === 6 && state.practiceStage === "feedback") return `<div class="action-bar"><button class="primary-action" data-next-question>अगला Question →</button></div>`;
      if (state.step === 6 && state.practiceStage === "question2") return `<div class="action-bar"><button class="primary-action" data-finish-practice>Result देखें →</button></div>`;
      if (state.step === 7) return `
        <div class="action-bar">
          <button class="chip strong" data-step="8">हाँ, Tips दो!</button>
          <button class="chip" data-reset>🔁 फिर से देखें</button>
        </div>`;
      return `<div class="action-bar"><button class="primary-action" data-reset>🔁 फिर से देखें</button></div>`;
    }

    function render() {
      if (state.tab === "learner") root.innerHTML = renderLearner();
      if (state.tab === "officer") root.innerHTML = renderOfficer();
      if (state.tab === "employer") root.innerHTML = renderEmployer();
      document.querySelectorAll(".top-nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === state.tab);
      });
      requestAnimationFrame(scrollChat);
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("button");
      if (!target) return;
      if (target.dataset.tab) setTab(target.dataset.tab);
      if (target.dataset.step) advance(Number(target.dataset.step));
      if (target.dataset.process !== undefined) processSkillCard();
      if (target.dataset.practice !== undefined) advance(6, { practiced: true, practiceStage: "start" });
      if (target.dataset.feedback !== undefined) setState({ practiceStage: "feedback" });
      if (target.dataset.nextQuestion !== undefined) nextQuestion();
      if (target.dataset.finishPractice !== undefined) finishPractice();
      if (target.dataset.reset !== undefined) resetDemo();
      if (target.dataset.tabJump) setTab(target.dataset.tabJump);
      if (target.dataset.learner !== undefined) setState({ selectedLearner: Number(target.dataset.learner) });
      if (target.dataset.backList !== undefined) setState({ selectedLearner: null });
      if (target.dataset.toggleAlerts !== undefined) setState({ alertsOpen: !state.alertsOpen });
      if (target.dataset.demoToast !== undefined) showToast("✅ Action simulated for demo");
      if (target.dataset.employerToast !== undefined) showToast("✅ Simulated: SaathiAI has notified Ramu of your interest!", true);
    });

    render();
  </script>
