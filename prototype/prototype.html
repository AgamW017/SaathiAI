<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SaathiAI Prototype Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wa-dark: #075E54;
      --wa-light: #25D366;
      --wa-chat: #E5DDD5;
      --wa-out: #DCF8C6;
      --ink: #212529;
      --muted: #6C757D;
      --navy: #1A237E;
      --line: #e5e7eb;
      --shadow: 0 12px 30px rgba(17, 24, 39, .13);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #E0E0E0;
      color: var(--ink);
      font: 14px/1.45 "Noto Sans", "Noto Sans Devanagari", system-ui, sans-serif;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease, background .15s ease;
    }
    button:active { transform: translateY(1px) scale(.99); }

    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,.05), 0 25px 70px rgba(0,0,0,.16);
      position: relative;
      overflow: hidden;
    }
    body[data-view="officer"],
    body[data-view="employer"] {
      background:
        linear-gradient(135deg, rgba(7,94,84,.08), transparent 34%),
        linear-gradient(225deg, rgba(37,211,102,.10), transparent 36%),
        #e7ecef;
    }
    body[data-view="officer"] .app-shell,
    body[data-view="employer"] .app-shell {
      width: min(100%, 1240px);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(18px);
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .top-nav button {
      min-height: 52px;
      padding: 6px 4px 8px;
      background: #fff;
      color: #374151;
      border-radius: 0;
      font-size: 12px;
      line-height: 1.18;
      border-bottom: 3px solid transparent;
    }
    .top-nav button.active {
      color: var(--wa-dark);
      border-bottom-color: var(--wa-light);
    }

    .demo-banner {
      position: sticky;
      top: 52px;
      z-index: 25;
      padding: 5px 8px;
      text-align: center;
      background: #F0F0F0;
      color: #666;
      font-size: 11px;
      border-bottom: 1px solid #ddd;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 76px;
      z-index: 100;
      max-width: min(360px, calc(100vw - 28px));
      transform: translateX(-50%) translateY(-12px);
      opacity: 0;
      pointer-events: none;
      background: #323232;
      color: #fff;
      border-radius: 20px;
      padding: 9px 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.24);
      transition: opacity .2s ease, transform .2s ease;
      font-size: 13px;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.green { background: #198754; }

    .view { min-height: calc(100vh - 79px); }

    .chat-view {
      height: calc(100vh - 79px);
      display: flex;
      flex-direction: column;
      background: var(--wa-chat);
    }
    .chat-header {
      flex: 0 0 auto;
      background: var(--wa-dark);
      color: #fff;
      padding: 10px 12px;
    }
    .chat-title-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .back { font-size: 22px; font-weight: 600; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      background: #9ca3af;
      font-weight: 800;
      font-size: 13px;
    }
    .avatar.tc { background: #2563eb; }
    .avatar.g { background: #f97316; }
    .chat-name { flex: 1; font-size: 16px; font-weight: 700; }
    .online { font-size: 12px; white-space: nowrap; }
    .step-label { margin-top: 2px; color: rgba(255,255,255,.78); font-size: 11px; }
    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      padding: 8px 0;
      background: rgba(255,255,255,.28);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a7b0ad;
    }
    .dot.active { background: var(--wa-light); }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 18px;
      background:
        radial-gradient(circle at 8px 8px, rgba(255,255,255,.23) 1px, transparent 1px),
        var(--wa-chat);
      background-size: 22px 22px;
    }
    .message-row {
      display: flex;
      gap: 7px;
      align-items: flex-end;
      margin: 8px 0;
      animation: popIn .2s ease both;
    }
    .message-row.out { justify-content: flex-end; }
    .message-row.out .bubble {
      background: var(--wa-out);
      border-top-right-radius: 3px;
    }
    .bubble {
      max-width: 82%;
      background: #fff;
      border-radius: 8px;
      border-top-left-radius: 3px;
      padding: 8px 9px 6px;
      box-shadow: 0 1px .5px rgba(0,0,0,.13);
      color: #111827;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }
    .sender {
      color: var(--wa-dark);
      font-weight: 700;
      font-size: 11px;
      margin-bottom: 3px;
    }
    .time {
      display: block;
      margin-top: 5px;
      color: #667085;
      text-align: right;
      font-size: 10px;
    }
    .voice {
      min-width: 230px;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #374151;
      font-weight: 600;
    }
    .play {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #e5e7eb;
      color: var(--wa-dark);
      font-size: 12px;
    }
    .wave { flex: 1; height: 4px; border-radius: 99px; background: repeating-linear-gradient(90deg, #8aa092 0 7px, transparent 7px 11px); }
    .date-sep {
      margin: 18px auto 12px;
      width: fit-content;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      color: #4b5563;
      box-shadow: 0 1px .5px rgba(0,0,0,.1);
      font-size: 12px;
      font-weight: 700;
    }
    @keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .action-bar {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #F0F0F0;
      border-top: 1px solid #ddd;
    }
    .primary-action {
      width: 100%;
      background: var(--wa-light);
      color: #063d2f;
      box-shadow: inset 0 -1px rgba(0,0,0,.12);
    }
    .chip {
      flex: 1 1 auto;
      padding: 0 12px;
      background: #fff;
      color: var(--wa-dark);
      border: 1px solid #d1d5db;
      font-size: 13px;
    }
    .chip.strong { background: var(--wa-light); color: #063d2f; border-color: var(--wa-light); }
    .processing {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--wa-dark);
      font-weight: 700;
    }
    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--wa-light);
      animation: pulse .75s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { transform: scale(.72); opacity: .55; } to { transform: scale(1.2); opacity: 1; } }

    body[data-view="learner"] {
      background:
        radial-gradient(circle at top, rgba(37,211,102,.14), transparent 34%),
        #d6dadd;
    }
    body[data-view="learner"] .app-shell {
      background: #0b141a;
    }
    .chat-view {
      position: relative;
      overflow: hidden;
      background: #0b141a;
    }
    .phone-status {
      flex: 0 0 auto;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #075E54;
      color: rgba(255,255,255,.92);
      font-size: 11px;
      font-weight: 700;
    }
    .phone-indicators {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
    }
    .battery {
      width: 18px;
      height: 9px;
      border: 1.5px solid rgba(255,255,255,.9);
      border-radius: 2px;
      position: relative;
    }
    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      background: rgba(255,255,255,.9);
      border-radius: 0 2px 2px 0;
    }
    .battery span {
      display: block;
      width: 70%;
      height: 100%;
      background: #fff;
    }
    .chat-header {
      position: relative;
      z-index: 2;
      padding: 8px 10px 7px;
      background: #075E54;
      box-shadow: 0 1px 0 rgba(0,0,0,.16);
    }
    .chat-title-row {
      gap: 8px;
    }
    .back {
      width: 24px;
      height: 34px;
      display: grid;
      place-items: center;
      font-size: 24px;
      line-height: 1;
      color: #fff;
      opacity: .95;
    }
    .chat-header .avatar {
      width: 39px;
      height: 39px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), transparent),
        #8aa3a0;
    }
    .chat-name {
      min-width: 0;
      font-size: 15px;
      line-height: 1.16;
    }
    .step-label {
      display: inline-flex;
      margin-top: 3px;
      color: rgba(255,255,255,.74);
      font-size: 11px;
      font-weight: 500;
    }
    .online {
      display: none;
    }
    .wa-icons {
      display: inline-flex;
      align-items: center;
      gap: 17px;
      color: #fff;
      font-size: 18px;
      opacity: .94;
      white-space: nowrap;
    }
    .dots {
      position: relative;
      z-index: 2;
      gap: 6px;
      padding: 7px 12px;
      background: #0b6b5e;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .dot {
      flex: 1;
      max-width: 34px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,.28);
    }
    .dot.active {
      background: #25D366;
      box-shadow: 0 0 0 1px rgba(37,211,102,.22);
    }
    .chat-body {
      position: relative;
      padding: 10px 9px 14px;
      background-color: #efe7dc;
      background-image:
        linear-gradient(rgba(239,231,220,.88), rgba(239,231,220,.88)),
        radial-gradient(circle at 20px 18px, rgba(72,98,85,.16) 0 1.1px, transparent 1.2px),
        radial-gradient(circle at 80px 38px, rgba(72,98,85,.10) 0 1px, transparent 1.1px),
        radial-gradient(circle at 132px 20px, rgba(72,98,85,.11) 0 1.2px, transparent 1.3px);
      background-size: auto, 112px 76px, 112px 76px, 112px 76px;
    }
    .chat-body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .36;
      background:
        linear-gradient(45deg, transparent 45%, rgba(7,94,84,.07) 46% 48%, transparent 49%) 0 0 / 58px 58px,
        linear-gradient(-45deg, transparent 46%, rgba(7,94,84,.055) 47% 49%, transparent 50%) 0 0 / 68px 68px;
    }
    .message-row {
      position: relative;
      z-index: 1;
      gap: 5px;
      align-items: flex-end;
      margin: 3px 0 7px;
    }
    .message-row .avatar {
      width: 25px;
      height: 25px;
      margin-bottom: 2px;
      font-size: 9px;
      box-shadow: 0 1px 1px rgba(0,0,0,.16);
    }
    .message-row.out {
      padding-right: 4px;
    }
    .bubble {
      position: relative;
      max-width: min(78%, 322px);
      border-radius: 7.5px;
      border-top-left-radius: 2px;
      padding: 6px 8px 5px;
      background: #fff;
      box-shadow: 0 1px .5px rgba(11,20,26,.20);
      font-size: 13.4px;
      line-height: 1.38;
      color: #111b21;
      overflow-wrap: break-word;
    }
    .bubble::before {
      content: "";
      position: absolute;
      left: -7px;
      top: 0;
      width: 8px;
      height: 13px;
      background: #fff;
      clip-path: polygon(100% 0, 0 0, 100% 100%);
    }
    .message-row.out .bubble {
      background: #D9FDD3;
      border-top-left-radius: 7.5px;
      border-top-right-radius: 2px;
    }
    .message-row.out .bubble::before {
      left: auto;
      right: -7px;
      background: #D9FDD3;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }
    .bubble.rich {
      width: min(91%, 350px);
      max-width: 91%;
      padding: 5px;
      background: #fff;
    }
    .bubble.rich::before {
      background: #fff;
    }
    .sender {
      margin-bottom: 2px;
      color: #0b7c69;
      font-size: 11px;
      line-height: 1.1;
      font-weight: 800;
    }
    .time {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
      float: right;
      margin: 5px 0 0 8px;
      color: #667781;
      font-size: 10.5px;
      line-height: 1;
      min-width: 42px;
    }
    .ticks {
      color: #53bdeb;
      font-weight: 900;
      letter-spacing: -2px;
      margin-left: 1px;
    }
    .voice {
      min-width: 238px;
      height: 40px;
      display: grid;
      grid-template-columns: 31px 1fr auto;
      gap: 9px;
      align-items: center;
      font-weight: 600;
    }
    .play {
      width: 31px;
      height: 31px;
      background: #e9edef;
      color: #54656f;
      font-size: 12px;
      padding-left: 2px;
    }
    .voice-stack {
      display: grid;
      gap: 6px;
    }
    .wave {
      height: 18px;
      border-radius: 0;
      background:
        linear-gradient(90deg,
          #8696a0 0 2px, transparent 2px 7px,
          #8696a0 7px 10px, transparent 10px 15px,
          #8696a0 15px 17px, transparent 17px 22px,
          #8696a0 22px 26px, transparent 26px 31px,
          #8696a0 31px 33px, transparent 33px 38px,
          #8696a0 38px 43px, transparent 43px 48px,
          #8696a0 48px 51px, transparent 51px 56px,
          #8696a0 56px 60px, transparent 60px 65px,
          #8696a0 65px 67px, transparent 67px 72px,
          #8696a0 72px 76px, transparent 76px 81px,
          #8696a0 81px 84px, transparent 84px 89px,
          #8696a0 89px 93px, transparent 93px);
      mask-image: linear-gradient(0deg, transparent 0 18%, #000 18% 82%, transparent 82%);
    }
    .voice-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #667781;
      font-size: 11px;
      line-height: 1;
    }
    .voice-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #25D366;
    }
    .voice-duration {
      color: #667781;
      font-size: 11px;
      align-self: end;
      padding-bottom: 5px;
    }
    .date-sep {
      position: relative;
      z-index: 1;
      margin: 13px auto 11px;
      padding: 5px 12px;
      border-radius: 7px;
      background: rgba(255,255,255,.76);
      color: #54656f;
      box-shadow: 0 1px .5px rgba(11,20,26,.18);
      font-size: 11px;
    }
    .action-bar {
      display: grid;
      gap: 7px;
      padding: 7px 7px 8px;
      background: #f0f2f5;
      border-top: 1px solid rgba(11,20,26,.08);
    }
    .reply-strip {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 0 2px 1px;
      scrollbar-width: none;
    }
    .reply-strip::-webkit-scrollbar { display: none; }
    .action-bar .primary-action,
    .action-bar .chip {
      width: auto;
      min-width: max-content;
      min-height: 37px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(7,94,84,.14);
      background: #fff;
      color: #075E54;
      box-shadow: 0 1px 2px rgba(11,20,26,.07);
      font-size: 13px;
    }
    .action-bar .chip.strong,
    .action-bar .primary-action {
      background: #e7fce3;
      border-color: rgba(37,211,102,.42);
      color: #075E54;
    }
    .composer-row {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 7px;
      align-items: center;
    }
    .composer-pill {
      min-height: 43px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      border-radius: 999px;
      background: #fff;
      color: #8696a0;
      box-shadow: 0 1px 1px rgba(11,20,26,.08);
    }
    .composer-pill span:first-child {
      font-size: 19px;
      color: #54656f;
    }
    .composer-text {
      flex: 1;
      color: #667781;
      font-size: 14px;
      font-weight: 500;
    }
    .composer-tools {
      display: inline-flex;
      gap: 13px;
      color: #54656f;
      font-size: 18px;
    }
    .send-fab {
      width: 44px;
      min-height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #00a884;
      color: #fff;
      box-shadow: 0 2px 5px rgba(11,20,26,.18);
      font-size: 18px;
      padding-left: 1px;
    }
    .processing {
      min-height: 37px;
      justify-content: flex-start;
      padding: 0 13px;
      border-radius: 999px;
      background: #fff;
      color: #075E54;
      box-shadow: 0 1px 2px rgba(11,20,26,.07);
    }

    .skill-card {
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid #e8edf5;
    }
    .skill-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--navy);
      color: #fff;
      padding: 10px 12px;
      font-weight: 800;
      letter-spacing: .02em;
      font-size: 13px;
    }
    .verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      background: var(--wa-light);
      color: #fff;
      padding: 4px 8px;
      font-size: 10px;
      white-space: nowrap;
    }
    .skill-body { padding: 12px; }
    .person-name { font-size: 18px; font-weight: 800; }
    .divider { height: 1px; background: #edf0f5; margin: 10px 0; }
    .check { color: var(--wa-light); font-weight: 900; margin-right: 6px; }
    .skill-foot { background: #f3f4f6; color: #4b5563; padding: 9px 12px; font-size: 11px; }

    .job-card {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .job-card .job-main { padding: 10px; }
    .job-title { font-size: 15px; font-weight: 800; }
    .job-company { color: #4b5563; margin-top: 2px; }
    .job-meta { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eef0f3; color: #374151; font-size: 12px; }
    .mini-apply {
      margin-top: 10px;
      width: 100%;
      min-height: 38px;
      border-radius: 6px;
      background: #eefdf4;
      color: var(--wa-dark);
    }

    .success-overlay {
      position: absolute;
      inset: 79px 0 0;
      z-index: 40;
      display: grid;
      place-items: center;
      background: var(--wa-light);
      color: #fff;
      padding: 24px;
      text-align: center;
      animation: fadeIn .22s ease both;
    }
    .success-card { width: 100%; max-width: 330px; }
    .success-emoji { font-size: 64px; line-height: 1; }
    .success-title { margin: 12px 0 4px; font-size: 24px; font-weight: 900; }
    .success-sub { margin-bottom: 20px; font-weight: 700; }
    .white-btn {
      width: 100%;
      margin-top: 9px;
      background: #fff;
      color: var(--wa-dark);
      border: 2px solid #fff;
    }
    .outline-btn { background: transparent; color: #fff; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .dash-view, .employer-view {
      min-height: calc(100vh - 79px);
      overflow-y: auto;
      background: #F8F9FA;
      padding: 14px;
    }
    .dash-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 8px;
      background: var(--wa-dark);
      color: #fff;
      box-shadow: 0 8px 22px rgba(7, 94, 84, .22);
    }
    .dash-title { font-size: 18px; font-weight: 800; }
    .dash-sub { color: rgba(255,255,255,.82); font-size: 12px; margin-top: 2px; }
    .alert-btn {
      padding: 0 10px;
      border-radius: 8px;

      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--accent, #075E54);
    }
    .metric-tile small {
      display: block;
      color: #64748b;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .metric-tile strong {
      display: block;
      margin-top: 8px;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      color: #0f172a;
    }
    .metric-tile span { color: #64748b; font-size: 12px; font-weight: 700; }
    .metric-spark {
      position: absolute;
      right: 14px;
      bottom: 13px;
      width: 72px;
      height: 28px;
      opacity: .95;
      background: linear-gradient(90deg, rgba(7,94,84,.16), rgba(37,211,102,.30));
      clip-path: polygon(0 72%, 15% 52%, 28% 65%, 42% 24%, 56% 42%, 70% 18%, 100% 36%, 100% 100%, 0 100%);
    }
    .ops-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(340px, .75fr);
      gap: 16px;
      align-items: start;
    }
    .ops-panel {
      background: #fff;
      border: 1px solid #e6ebf1;
      border-radius: 8px;
      box-shadow: 0 14px 30px rgba(15,23,42,.05);
    }
    .ops-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 15px 16px;
      border-bottom: 1px solid #edf2f7;
    }
    .ops-panel-head h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }
    .ops-panel-head span {
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }
    .intervention-table {
      display: grid;
    }
    .intervention-head,
    .intervention-row {
      display: grid;
      grid-template-columns: 1.05fr .8fr .95fr 1.55fr 170px;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
    }
    .intervention-head {
      background: #f8fafc;
      color: #64748b;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .07em;
      text-transform: uppercase;
    }
    .intervention-row {
      min-height: 86px;
      border-top: 1px solid #edf2f7;
    }
    .intervention-row:nth-child(even) { background: #fcfdff; }
    .ai-rec {
      color: #334155;
      font-size: 13px;
      font-style: italic;
    }
    .nudge-btn {
      width: 100%;
      background: #075E54;
      color: #fff;
    }
    .pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
    }
    .pill.red { background: #fee2e2; color: #b91c1c; }
    .pill.amber { background: #fef3c7; color: #b45309; }
    .pill.green { background: #dcfce7; color: #166534; }
    .panel-foot {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid #edf2f7;
      color: #64748b;
      font-size: 12px;
    }
    .panel-foot button {
      min-height: 34px;
      padding: 0 10px;
      color: #075E54;
      background: #ecfdf3;
    }
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .chart-card {
      min-height: 262px;
      padding: 16px;
      background: #fff;
      border: 1px solid #e6ebf1;
      border-radius: 8px;
      box-shadow: 0 14px 30px rgba(15,23,42,.05);
    }
    .chart-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      color: #0f172a;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    .chart-title span { color: #64748b; font-weight: 700; letter-spacing: 0; text-transform: none; }
    .bar-chart {
      height: 142px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      align-items: end;
      padding: 10px 4px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .bar-chart div {
      position: relative;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, #8ab4ff, #d7e6ff);
      min-height: 22px;
    }
    .bar-chart div.active { background: linear-gradient(180deg, #25D366, #075E54); }
    .bar-chart div span {
      position: absolute;
      left: 50%;
      bottom: -25px;
      transform: translateX(-50%);
      color: #64748b;
      font-size: 11px;
      white-space: nowrap;
    }
    .chart-note {
      margin-top: 34px;
      color: #64748b;
      font-size: 12px;
    }
    .funnel {
      display: grid;
      gap: 9px;
      margin-top: 8px;
    }
    .funnel-row {
      display: grid;
      grid-template-columns: 96px 1fr 56px;
      gap: 10px;
      align-items: center;
      color: #475569;
      font-size: 12px;
      font-weight: 800;
    }
    .track {
      height: 12px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--accent, #25D366);
    }
    .heatmap {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }
    .heat-row {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: #475569;
      font-weight: 800;
    }
    .heat-cell {
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(37,211,102,.22), rgba(37,211,102,.92));
    }
    .heat-cell.mid { background: linear-gradient(90deg, rgba(37,211,102,.16), rgba(59,130,246,.70)); }
    .heat-cell.low { background: linear-gradient(90deg, rgba(245,158,11,.14), rgba(245,158,11,.70)); }
    .ai-feed {
      display: grid;
      gap: 10px;
      padding: 14px;
    }
    .feed-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      padding: 11px;
      border: 1px solid #edf2f7;
      border-radius: 8px;
      background: #fbfdff;
    }
    .feed-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #ecfdf3;
    }
    .feed-item strong { display: block; }
    .feed-item span { color: #64748b; font-size: 12px; }

    @media (max-width: 1120px) {
      .ops-dashboard,
      .ops-grid {
        grid-template-columns: 1fr;
      }
      .ops-rail { display: none; }
      .ops-main { padding: 0 16px 18px; }
      .ops-topbar { margin: 0 -16px 18px; padding: 10px 16px; grid-template-columns: 1fr auto; }
      .officer-chip { display: none; }
      .intervention-head { display: none; }
      .intervention-row { grid-template-columns: 1fr; gap: 8px; }
    }

    @media (max-width: 760px) {
      .metric-strip,
      .analytics-grid {
        grid-template-columns: 1fr;
      }
      .ops-title-row {
        display: grid;
      }
      .ops-report { min-width: 0; }
    }

    @media (min-width: 620px) {
      body { padding: 24px 0; }
      .app-shell {
        min-height: calc(100vh - 48px);
        border-radius: 28px;
        border: 10px solid #111827;
      }
      .chat-view, .view, .dash-view, .employer-view { min-height: calc(100vh - 127px); }
      .chat-view { height: calc(100vh - 127px); }
      .success-overlay { inset: 79px 0 0; }
      .toast { top: 92px; }
    }

    @media (min-width: 900px) {
      body[data-view="officer"] .app-shell,
      body[data-view="employer"] .app-shell {
        min-height: calc(100vh - 32px);
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,.55);
      }
      body[data-view="officer"],
      body[data-view="employer"] {
        padding: 16px;
      }
      body[data-view="officer"] .top-nav button,
      body[data-view="employer"] .top-nav button {
        font-size: 14px;
      }
      body[data-view="officer"] .dash-view,
      body[data-view="employer"] .employer-view {
        min-height: calc(100vh - 111px);
      }
    }

    @media (max-width: 980px) {
      .desktop-top,
      .dashboard-grid,
      .detail.pro,
      .employer-view.pro {
        grid-template-columns: 1fr;
      }
      .live-card { width: 100%; }
      .kpi-grid,
      .triage-board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .table-head { display: none; }
      .learner-table .learner-row {
        grid-template-columns: 1fr auto;
      }
      .learner-table .learner-row > span:nth-child(2),
      .learner-table .learner-row > span:nth-child(3) {
        display: none;
      }
    }

    @media (max-width: 620px) {
      .dash-view.pro,
      .employer-view.pro {
        padding: 14px;
      }
      .hero-title { font-size: 24px; }
      .kpi-grid,
      .triage-board,
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <nav class="top-nav" aria-label="Prototype views">
      <button type="button" data-tab="learner" class="active">👤 Learner View</button>
      <button type="button" data-tab="officer">📊 Officer Dashboard</button>
      <button type="button" data-tab="employer">🏭 Employer View</button>
    </nav>
    <div class="demo-banner">🎓 SaathiAI — Prototype Demo | Hackathon Submission</div>
    <section id="root"></section>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script>
    const state = {
      tab: "learner",
      step: 1,
      processing: false,
      practiceStage: "start",
      practiced: false,
      selectedLearner: null,
      alertsOpen: false,
      officerFilter: "all",
      toastTimer: null
    };

    const learners = [
      ["Ramu Kumar", "Electrician L3", "Active now", "🟢 PLACED", "placed", "#075E54"],
      ["Priya Devi", "COPA L3", "2 hours ago", "🟡 IN PROGRESS", "progress", "#2563eb"],
      ["Suresh Yadav", "Fitter L3", "Yesterday", "🟡 IN PROGRESS", "progress", "#7c3aed"],
      ["Anita Singh", "Electrician L3", "3 days ago", "🟠 NEEDS NUDGE", "nudge", "#ea580c"],
      ["Mohan Lal", "Mechanic L4", "8 days ago", "🔴 AT RISK", "risk", "#dc2626"],
      ["Kavya Tiwari", "COPA L3", "Just now", "🟢 PLACED", "placed", "#16a34a"]
    ];

    const jobs = [
      ["⚡ Electrical Contractor", "Gupta Electricals Pvt. Ltd.", "📍 12 km — Varanasi City", "💰 ₹14,000 – ₹18,000 / month", "🕐 Posted 2 days ago • 2 openings"],
      ["🏭 Apprentice Electrician", "Varanasi Industrial Zone (NAPS)", "📍 18 km — Ramnagar", "💰 ₹8,000 stipend / month", "🏛️ Government Registered • NAPS"],
      ["⚡ Junior Electrician", "BHU Infrastructure Projects", "📍 8 km — BHU Campus", "💰 ₹12,000 – ₹15,000 / month", "🕐 Posted today • 1 opening"]
    ];

    const root = document.getElementById("root");
    const toast = document.getElementById("toast");

    function setState(next) {
      Object.assign(state, next);
      render();
    }

    function showToast(message, green = false) {
      clearTimeout(state.toastTimer);
      toast.textContent = message;
      toast.className = "toast show" + (green ? " green" : "");
      state.toastTimer = setTimeout(() => toast.className = "toast", 2500);
    }

    function setTab(tab) {
      state.tab = tab;
      state.selectedLearner = null;
      document.querySelectorAll(".top-nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      render();
    }

    function advance(step, extra = {}) {
      setState({ step, processing: false, ...extra });
      requestAnimationFrame(scrollChat);
    }

    function resetDemo() {
      setState({ step: 1, processing: false, practiceStage: "start", practiced: false });
      showToast("Demo restarted");
    }

    function processSkillCard() {
      setState({ processing: true });
      setTimeout(() => advance(4), 1500);
    }

    function nextQuestion() {
      setState({ practiceStage: "question2" });
      requestAnimationFrame(scrollChat);
    }

    function finishPractice() {
      advance(7, { practiced: true, practiceStage: "done" });
    }

    function scrollChat() {
      const end = document.getElementById("chat-end");
      if (end) end.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      })[char]);
    }

    function message({ side = "in", sender = "SaathiAI", avatar = "S", avatarClass = "", text = "", html = "", time = "", voice = "", date = "" }) {
      if (date) return `<div class="date-sep">${date}</div>`;
      const outgoing = side === "out";
      return `
        <div class="message-row ${outgoing ? "out" : ""}">
          ${outgoing ? "" : `<span class="avatar ${avatarClass}">${avatar}</span>`}
          <div class="bubble ${html ? "rich" : ""}">
            ${!outgoing && sender ? `<div class="sender">${sender}</div>` : ""}
            ${voice ? voiceBubble(voice) : (html || escapeHtml(text))}
            ${time ? `<span class="time">${time}${outgoing ? `<span class="ticks">✓✓</span>` : ""}</span>` : ""}
          </div>
        </div>
      `;
    }

    function voiceBubble(duration) {
      return `
        <div class="voice">
          <span class="play">▶</span>
          <span class="voice-stack">
            <span class="wave"></span>
            <span class="voice-meta"><span class="voice-dot"></span>Voice note</span>
          </span>
          <span class="voice-duration">${duration}</span>
        </div>
      `;
    }

    function skillCard(compact = false) {
      return `
        <div class="skill-card">
          <div class="skill-head"><span>🔵 SAATHI SKILL CARD</span><span class="verified">✓ VERIFIED</span></div>
          <div class="skill-body">
            <div class="person-name">Ramu Kumar</div>
            <div>Electrician • NSQF Level 3</div>
            <div>📍 Varanasi, Uttar Pradesh</div>
            <div class="divider"></div>
            <div><span class="check">✓</span>Wiring & Electrical Circuits</div>
            <div><span class="check">✓</span>Panel Board Installation (3-phase)</div>
            <div><span class="check">✓</span>IS 732 Safety Protocols</div>
            <div><span class="check">✓</span>150hr On-the-Job Training</div>
            <div><span class="check">✓</span>PMKVY Certified — June 2026</div>
          </div>
          <div class="skill-foot">🔗 Verified via SIDH • DigiLocker<br>ID: SIDH-2026-VNS-04821</div>
        </div>
      `;
    }

    function jobCard(job) {
      return `
        <div class="job-card">
          <div class="job-main">
            <div class="job-title">${job[0]}</div>
            <div class="job-company">${job[1]}</div>
            <div class="job-meta">
              <div>${job[2]}</div>
              <div>${job[3]}</div>
              <div>${job[4]}</div>
            </div>
            <button type="button" class="mini-apply" data-demo-toast>Apply करें →</button>
          </div>
        </div>
      `;
    }

    function learnerMessages() {
      const chunks = [];
      chunks.push(message({
        sender: "Training Centre", avatar: "TC", avatarClass: "tc", time: "10:32",
        text: "नमस्ते Ramu ji! 🎉\n\nआपका PMKVY Electrician course पूरा हो गया। बधाई हो!\n\nअब SaathiAI आपकी job ढूंढने में मदद करेगा। नीचे START दबाएं।"
      }));
      if (state.step >= 2) {
        chunks.push(message({ side: "out", text: "START", time: "10:33" }));
        chunks.push(message({
          time: "10:33",
          text: "🙏 नमस्ते Ramu ji!\n\nमैं SaathiAI हूँ — आपका career साथी।\n\nमुझे बताइए:\nआपने कौन सा trade किया?\nऔर आपका district कौन सा है?"
        }));
        chunks.push(message({ voice: "0:12", time: "10:33" }));
      }
      if (state.step >= 3) {
        chunks.push(message({ side: "out", voice: "0:22", time: "10:34" }));
        chunks.push(message({
          time: "10:35",
          text: "✅ सुना और समझा!\n\nआपने बताया:\n• Trade: Electrician\n• NSQF Level: 3\n• District: Varanasi, UP\n• OJT: 150 घंटे\n• Skills: Wiring, Panel Board,\n  3-phase circuits\n\nआपका Skill Card बन रहा है... ⚙️"
        }));
      }
      if (state.step >= 4) {
        chunks.push(message({ html: skillCard(true), time: "10:37" }));
        chunks.push(message({
          time: "10:37",
          text: "यह आपका Skill Card है। 🎉\n\nयह link MSME employers को भेजा जाएगा ताकि वे आपकी skills verify कर सकें।\n\nअब job matches देखें?"
        }));
      }
      if (state.step >= 5) {
        chunks.push(message({
          time: "10:38",
          text: "🎯 आपके लिए 3 Job Matches मिले!\n(Varanasi के 25km के अंदर)"
        }));
        jobs.forEach(job => chunks.push(message({ html: jobCard(job), time: "10:38" })));
        chunks.push(message({
          time: "10:39",
          text: "क्या interview की तैयारी करनी है? 🎯\nमैं आपके trade के questions पूछूंगा।"
        }));
      }
      if (state.step >= 6 && state.practiced) {
        chunks.push(message({
          time: "10:40",
          text: "👨‍💼 Interview Practice शुरू!\n\nमैं अभी interviewer हूँ।\nपहला सवाल:\n\n“आपने किस तरह का electrical work किया है? एक real example दीजिए।”"
        }));
        chunks.push(message({ voice: "0:10", time: "10:40" }));
        if (state.practiceStage === "feedback" || state.practiceStage === "question2" || state.step >= 7) {
          chunks.push(message({ side: "out", voice: "0:18", time: "10:41" }));
          chunks.push(message({
            time: "10:41",
            text: "👍 अच्छा जवाब!\n\nएक tip: अपने specific project का नाम लें, जैसे —\n“मैंने Gupta factory में 3-phase panel board install किया था।”\n\nयह employers को impress करता है। ✅"
          }));
        }
        if (state.practiceStage === "question2" || state.step >= 7) {
          chunks.push(message({
            time: "10:42",
            text: "“अगर कोई electrical fault आए तो आप क्या करेंगे?”"
          }));
        }
      }
      if (state.step >= 7) {
        chunks.push(message({ date: "14 दिन बाद" }));
        chunks.push(message({
          sender: "Gupta Electricals", avatar: "G", avatarClass: "g", time: "11:15",
          text: "Namaste Ramu ji!\n\nAapko Gupta Electricals mein select kiya gaya hai. 🎉\n\nJoining Date: Monday, 9 June\nSalary: ₹16,000/month"
        }));
        chunks.push(message({
          time: "11:16",
          text: "🎊 बधाई हो Ramu ji!\n\nआपको पहली job मिल गई!\nTraining complete से job तक: 14 दिन\n\nपहले दिन के लिए tips चाहिए?"
        }));
      }
      if (state.step >= 8) {
        chunks.push(message({
          time: "11:17",
          text: "💼 पहले दिन के लिए Tips:\n\n✅ 15 मिनट पहले पहुँचें\n✅ Safety shoes और uniform लाएं\n✅ Supervisor का नाम याद रखें\n✅ पहले दिन ज्यादा सुनें, कम बोलें\n✅ अपने tools की list बना लें\n\nAll the best! आप कर सकते हैं। 💪"
        }));
      }
      chunks.push(`<div id="chat-end"></div>`);
      return chunks.join("");
    }

    function actionBar() {
      const composer = (buttons, sendIcon = "🎙") => `
        <div class="action-bar">
          <div class="reply-strip">${buttons}</div>
          <div class="composer-row">
            <div class="composer-pill">
              <span>☺</span>
              <span class="composer-text">Message</span>
              <span class="composer-tools">⌘ 📎</span>
            </div>
            <button class="send-fab" type="button" data-demo-toast>${sendIcon}</button>
          </div>
        </div>`;
      if (state.processing) return composer(`<div class="processing"><span class="pulse"></span>Processing...</div>`, "⏳");
      if (state.step === 1) return composer(`<button class="primary-action" data-step="2">START करें →</button>`, "➤");
      if (state.step === 2) return composer(`
          <button class="chip strong" data-step="3">🎤 Voice Note भेजें</button>
          <button class="chip" data-step="3">✍️ Type करें</button>
          <button class="chip" data-step="3">हिंदी में बात करें</button>
        `, "🎙");
      if (state.step === 3) return composer(`<button class="primary-action" data-process>Skill Card देखें →</button>`, "➤");
      if (state.step === 4) return composer(`<button class="primary-action" data-step="5">हाँ, Jobs दिखाओ! →</button>`, "➤");
      if (state.step === 5) return composer(`
          <button class="chip strong" data-practice>हाँ, Practice करें!</button>

      if (state.tab === "employer") root.innerHTML = renderEmployer();
      document.querySelectorAll(".top-nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === state.tab);
      });
      requestAnimationFrame(scrollChat);
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("button");
      if (!target) return;
      if (target.dataset.tab) setTab(target.dataset.tab);
      if (target.dataset.step) advance(Number(target.dataset.step));
      if (target.dataset.process !== undefined) processSkillCard();
      if (target.dataset.practice !== undefined) advance(6, { practiced: true, practiceStage: "start" });
      if (target.dataset.feedback !== undefined) setState({ practiceStage: "feedback" });
      if (target.dataset.nextQuestion !== undefined) nextQuestion();
      if (target.dataset.finishPractice !== undefined) finishPractice();
      if (target.dataset.reset !== undefined) resetDemo();
      if (target.dataset.tabJump) setTab(target.dataset.tabJump);
      if (target.dataset.learner !== undefined) setState({ selectedLearner: Number(target.dataset.learner) });
      if (target.dataset.backList !== undefined) setState({ selectedLearner: null });
      if (target.dataset.toggleAlerts !== undefined) setState({ alertsOpen: !state.alertsOpen });
      if (target.dataset.filter !== undefined) setState({ officerFilter: target.dataset.filter });
      if (target.dataset.demoToast !== undefined) showToast("✅ Action simulated for demo");
      if (target.dataset.employerToast !== undefined) showToast("✅ Simulated: SaathiAI has notified Ramu of your interest!", true);
